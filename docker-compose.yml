version: '3.8'

services:
  collector:
    build: ./collector
    container_name: trading-bot-collector
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data: